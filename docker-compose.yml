services:
  dash:
    image: ghcr.io/uptimekit/dash:latest
    ports:
      - "${DASH_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/uptimekit
      - TIMESERIES_BACKEND=${TIMESERIES_BACKEND:-timescaledb}
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'IP=$$(hostname -i | awk ''{print $$1}''); wget -qO- "http://$$IP:3000/api/health" >/dev/null 2>&1',
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: always

  status-page:
    image: ghcr.io/uptimekit/status-page:latest
    ports:
      - "${STATUS_PAGE_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/uptimekit
      - TIMESERIES_BACKEND=${TIMESERIES_BACKEND:-timescaledb}
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      dash:
        condition: service_healthy
    restart: always

  db:
    image: timescale/timescaledb:latest-pg18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uptimekit
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uptimekit"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: always

  redis:
    image: redis:8.0-alpine
    volumes:
      - redis_data:/data
    restart: always

volumes:
  db_data:
  redis_data:
